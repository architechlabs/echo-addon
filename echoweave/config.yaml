name: Echo Bridge
description: >-
  Alexa to Music Assistant bridge. Automatically discovers Music Assistant,
  installs the Echoweave Proxy integration into Home Assistant, and creates
  media-player entities that Music Assistant can target for playback on Alexa.
version: "2.2.1"
slug: echo_bridge
url: https://github.com/architechlabs/echo-addon
init: false
startup: services
boot: auto
stage: stable

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Alexa skill endpoint and proxy API

map:
  - data:rw
  - config:rw

hassio_api: true
homeassistant_api: true
auth_api: false

options:
  public_url: "https://echo-api.gethomeassistant.com"
  oauth_client_id: echo-bridge
  oauth_client_secret: ""
  alexa_skill_id: "amzn1.ask.skill.66fa2985-269c-44af-8a30-7819294ddd65"
  alexa_validation: enforce
  log_level: INFO
  backend_ws_url: ""
  backend_ws_token: ""
  backend_instance_id: echoweave-local
  auto_discover_ma: true
  auto_setup_integration: true
  local_ma_url: ""
  local_ma_token: ""
  worker_url: "https://echo-api.gethomeassistant.com"
  worker_secret: ""
  proxy_player_prefix: addon
  proxy_player_filter: ""
  proxy_volume_player: ""

schema:
  public_url: str
  oauth_client_id: str
  oauth_client_secret: str
  alexa_skill_id: str
  alexa_validation: "list(enforce|log|off)"
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  backend_ws_url: str?
  backend_ws_token: str?
  backend_instance_id: str?
  auto_discover_ma: bool?
  auto_setup_integration: bool?
  local_ma_url: str?
  local_ma_token: str?
  worker_url: str?
  worker_secret: str?
  proxy_player_prefix: str?
  proxy_player_filter: str?
  proxy_volume_player: str?
